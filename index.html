<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Etch-a-Sketch</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH" crossorigin="anonymous">
    <link rel="stylesheet" href="styles.css">
    <script defer src="app.js"></script>
</head>
<body>
    <div class="container py-5">
        <h1 class="h1 mb-0">Etch-a-Sketch</h1>
        <p class="text-secondary mb-0">Draw by moving across the grid.</p>

        <div class="d-flex flex-wrap justify-content-center gap-2 mb-2 pb-2">
            <button id="clear" class="btn btn-outline-secondary btn-sm" type="button">Clear</button>
            <button id="resize" class="btn btn-outline-primary btn-sm" type="button">Resize</button>
            <button id="rgb" class="btn btn-warning btn-sm" type="button">RGB</button>
            <button id="black" class="btn btn-dark btn-sm" type="button">Black</button>
        </div>

        <div id="sketch"></div>

    </div>
</body>
</html>
